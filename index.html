<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#faf6f1">
    <meta name="description" content="色彩辞典 - Sanzo Wada Color Combinations">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="色彩辞典">
    <title>色彩辞典 - Sanzo Colors</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23faf6f1' width='180' height='180'/%3E%3Crect fill='%231a1a1a' x='60' y='60' width='60' height='60'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --accent-beige: #ede8e0;
            --bg: #faf6f1;
            --text-primary: #2a2a2a;
            --text-secondary: #6a6a6a;
            --border: #e8e3dc;
            --divider: #d4cdc4;
            font-size: 16px;
        }

        html {
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        body {
            width: 100%;
            height: 100%;
            font-family: 'Shippori Mincho', Georgia, 'Times New Roman', serif;
            color: var(--text-primary);
            background: var(--bg);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            padding-top: calc(1rem + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 0 var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 0.75rem;
            font-family: 'Shippori Mincho', Georgia, serif;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        input[type="text"], input[type="color"] {
            padding: 0.5rem 0.2rem;
            border: none;
            border-bottom: 1px solid var(--divider);
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            border-radius: 0;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        input[type="color"] {
            width: 55px;
            padding: 0.6rem;
            cursor: pointer;
        }

        input[type="text"]:focus, input[type="color"]:focus {
            outline: none;
            border-bottom-color: var(--primary);
        }

        .view-toggle {
            display: flex;
            gap: 0.3rem;
        }


        /* Splash Screen */
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #d4a96a;
            z-index: 9999;
            display: grid;
            grid-template-columns: 2fr 3fr;
            grid-template-rows: 3fr 1fr 1.5fr;
            transition: opacity 0.7s ease;
            overflow: hidden;
        }
        .splash.hidden { opacity: 0; pointer-events: none; }
        .splash-block-a {
            grid-column: 1; grid-row: 1 / 3;
            background: #5c4a5a;
        }
        .splash-block-b {
            grid-column: 2; grid-row: 1;
            background: #3a7a5c;
            display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .splash-kanji {
            color: #d4a96a;
            font-size: clamp(3.5rem, 13vw, 8rem);
            font-family: 'Shippori Mincho', Georgia, serif;
            font-weight: 600;
            line-height: 1;
            letter-spacing: -0.03em;
            text-align: center;
        }
        .splash-block-c {
            grid-column: 2; grid-row: 2;
            background: #e8c030;
            display: flex; align-items: center; justify-content: center; padding: 0.5rem 1.5rem;
        }
        .splash-subtitle {
            font-size: clamp(0.65rem, 2.2vw, 0.95rem);
            color: #1a1a1a;
            letter-spacing: 0.05em;
            text-align: center;
            font-weight: 600;
            font-family: 'Shippori Mincho', serif;
        }
        .splash-block-d {
            grid-column: 1 / 3; grid-row: 3;
            background: #c04020;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-en {
            color: #d4a96a;
            font-size: clamp(0.8rem, 2.5vw, 1.3rem);
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-align: center;
            font-family: 'IM Fell English', Georgia, serif;
        }
        .splash-publisher {
            position: absolute;
            bottom: 1.5rem; right: 1.5rem;
            color: #d4a96a;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Mini scala cromatica custom */
        .color-scale {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 7px;
            background: linear-gradient(180deg, transparent 0%, transparent 100%);
            z-index: 100;
            cursor: ns-resize;
            border-right: 1px solid var(--border);
            touch-action: none;
        }

        .color-scale-indicator {
            position: absolute;
            left: -3px;
            width: 10px;
            height: 2px;
            background: white;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
            border-radius: 1px;
            will-change: top;
            pointer-events: none;
        }

        button {
            padding: 0.4rem 0.6rem;
            border: none;
            border-bottom: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        button:hover {
            color: var(--text-primary);
            border-bottom-color: var(--divider);
            background: transparent;
        }

        button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: transparent;
        }

        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2rem;
            padding-left: 2.3rem;
            position: relative;
            margin-left: 4px;
        }

        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .color-card {
            background: white;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card-number {
            position: absolute;
            top: 0.5rem;
            right: 0.6rem;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.65);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .color-card:hover {
            border-color: var(--primary);
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
        }

        .color-info {
            padding: 1.2rem;
            background: var(--bg);
        }

        .color-name {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 0.6rem;
            letter-spacing: -0.2px;
        }

        .color-hex {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .color-usage {
            font-size: 0.75rem;
            color: #999;
        }

        .list-view {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-row:hover {
            background: var(--bg);
        }

        .color-row-swatch {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .color-row-info {
            flex: 1;
        }

        .color-row-name {
            font-weight: 400;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .color-row-code {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            overflow-y: auto;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-drag-handle {
            width: 36px;
            height: 3px;
            background: var(--divider);
            border-radius: 2px;
            margin: 0.75rem auto 0;
        }

        .modal-header {
            padding: 1.5rem 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 0 var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            flex: 1;
        }

        .modal-header h2::after {
            content: '';
            display: block;
            width: 1.8rem;
            height: 1px;
            background: var(--primary);
            margin-top: 0.6rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .modal-color-swatch {
            width: 100%;
            height: 220px;
        }

        .modal-details {
            padding: 2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .detail-row:last-of-type {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .detail-value {
            font-family: 'Courier New', monospace;
            color: var(--text-primary);
            text-align: right;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: all;
        }

        .color-combinations {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .combinations-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .combinations-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .combo-tag {
            background: var(--bg);
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .combo-tag:hover {
            background: var(--accent-beige);
            border-color: var(--divider);
        }

        .combo-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .combo-preview {
            display: flex;
            gap: 0.3rem;
            height: 20px;
            flex-shrink: 0;
        }

        .combo-preview-swatch {
            flex: 0 0 auto;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .combo-tag.active .combo-preview-swatch {
            border-color: white;
        }

        .combo-details {
            display: none;
            margin-top: 0.5rem;
            padding: 1.2rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-top: none;
        }

        .combo-details.expanded {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .combo-color-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: white;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .combo-color-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.08);
        }

        .combo-color-swatch {
            width: 90px;
            align-self: stretch;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .combo-color-info {
            flex: 1;
        }

        .combo-color-name {
            font-size: 0.85rem;
            font-weight: 400;
            margin-bottom: 0.4rem;
        }

        .combo-color-codes {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: monospace;
            line-height: 1.4;
        }

        .modal-actions {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 1rem 1.2rem;
        }

        aside {
            display: none;
            width: 300px;
            background: var(--accent-beige);
            border-left: 1px solid var(--border);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            flex-direction: column;
        }

        aside.active {
            display: flex;
        }

        .favorites-title {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .favorite-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.9rem;
            background: white;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .favorite-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.08);
        }

        .favorite-item-swatch {
            width: 45px;
            height: 45px;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .favorite-item-info {
            flex: 1;
            min-width: 0;
        }

        .favorite-item-name {
            font-size: 0.8rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .favorite-item-hex {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .remove-favorite {
            background: none;
            border: none;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
        }

        .empty-favorites {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            padding: 1.5rem;
        }

        footer {
            padding: 1.2rem 2rem;
            padding-bottom: calc(1.2rem + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            background: var(--bg);
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            text-align: center;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .color-scale {
                width: 9px;
            }

            input[type="color"] {
                display: none;
            }

            .view-toggle button {
                padding: 0.35rem 0.6rem;
                font-size: 0.7rem;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }

            header {
                padding: 1.5rem 1.2rem;
            }

            main {
                padding: 1.2rem;
            }

            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }

            aside {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 999;
                width: 280px;
            }

            .modal-content {
                max-width: 95vw;
            }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 1rem 1.8rem;
            font-size: 0.9rem;
            z-index: 2000;
        }

        header, #mainWrapper, footer, .color-scale {
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.ready header, body.ready #mainWrapper, body.ready footer, body.ready .color-scale {
            opacity: 1;
        }
    </style>
</head>
<body>

        <div class="splash" id="splashScreen">
        <div class="splash-block-a"></div>
        <div class="splash-block-b">
            <div class="splash-kanji">配色<br>事典</div>
        </div>
        <div class="splash-block-c">
            <div class="splash-subtitle">大正・昭和の色彩ノート</div>
        </div>
        <div class="splash-block-d">
            <div class="splash-en">A Dictionary of Color Combinations</div>
        </div>
        <div class="splash-publisher">Seigensha</div>
    </div>

    <header>
        <h1>色彩辞典</h1>
        <div class="subtitle">Sanzo Wada Dictionary</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="名前またはHEX">
            <input type="color" id="colorPicker" title="Filtra per tonalita">
        </div>
        <div class="view-toggle">
            <button id="gridBtn" class="active">格子</button>
            <button id="listBtn">一覧</button>
            <button id="favBtn">お気に入り</button>
        </div>
    </header>

    <div id="mainWrapper" style="display: flex; flex: 1; overflow: hidden;">
        <main id="mainContent">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </main>
        <aside id="favoritesSidebar"></aside>
    </div>

    <footer>
        <div class="footer-content">
            <span id="colorCount">読み込み中...</span>
            <span>Wada Sanzo - Color Combinations</span>
        </div>
    </footer>

    <div class="color-scale">
        <div class="color-scale-indicator"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h2 id="modalTitle">Colore</h2>
                <button class="modal-close" onclick="closeModal()">x</button>
            </div>
            <div id="modalSwatch" class="modal-color-swatch"></div>
            <div class="modal-details">
                <div class="detail-row">
                    <span class="detail-label">Nome</span>
                    <span class="detail-value" id="detailName" style="cursor: auto;">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Hex</span>
                    <span class="detail-value" id="detailHex">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">RGB</span>
                    <span class="detail-value" id="detailRgb">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">CMYK</span>
                    <span class="detail-value" id="detailCmyk">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Combinazioni</span>
                    <span class="detail-value" id="detailUsage" style="cursor: auto;">-</span>
                </div>
                <div class="color-combinations" id="colorCombos" style="display:none;">
                    <div class="combinations-title">Usato in</div>
                    <div class="combinations-list" id="combinationsList"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="modalFavBtn">Preferiti</button>
                <button id="modalShareBtn">Condividi</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            colors: [],
            favorites: [],
            currentView: 'grid',
            searchTerm: '',
            colorFilter: null,
            selectedColor: null,
            expandedCombo: null
        };

        document.addEventListener('DOMContentLoaded', init);

        // Splash screen - 2 secondi poi sparisce
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            splash.classList.add('hidden');
            setTimeout(() => {
                splash.remove();
                document.body.classList.add('ready');
            }, 600);
        }, 2000);


        async function init() {
            loadFavorites();
            await fetchColors();
            setupEventListeners();
            renderColors();
        }

        async function fetchColors() {
            try {
                const response = await fetch('https://sanzo-wada.dmbk.io/assets/colors.json');
                const data = await response.json();
                state.colors = data.colors;
                updateColorCount();
            } catch (error) {
                console.error('Errore:', error);
                document.getElementById('mainContent').innerHTML = 
                    '<div style="padding: 2rem; text-align: center; color: #6a6a6a;">Errore nel caricamento. Controlla la connessione.</div>';
            }
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.searchTerm = e.target.value.toLowerCase();
                renderColors();
            });

            document.getElementById('colorPicker').addEventListener('input', (e) => {
                state.colorFilter = e.target.value;
                renderColors();
            });

            document.getElementById('gridBtn').addEventListener('click', () => {
                state.currentView = 'grid';
                document.getElementById('gridBtn').classList.add('active');
                document.getElementById('listBtn').classList.remove('active');
                renderColors();
            });

            document.getElementById('listBtn').addEventListener('click', () => {
                state.currentView = 'list';
                document.getElementById('listBtn').classList.add('active');
                document.getElementById('gridBtn').classList.remove('active');
                renderColors();
            });

            document.getElementById('favBtn').addEventListener('click', () => {
                document.getElementById('favoritesSidebar').classList.toggle('active');
            });

            document.getElementById('detailHex').addEventListener('click', function() {
                navigator.clipboard.writeText(this.textContent).then(() => {
                    showToast('Copiato: ' + this.textContent);
                });
            });

            document.getElementById('modalFavBtn').addEventListener('click', toggleFavorite);
            document.getElementById('modalShareBtn').addEventListener('click', shareColor);
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // Swipe down per chiudere il modale
            let touchStartY = 0;
            const modalContent = document.querySelector('.modal-content');
            modalContent.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            modalContent.addEventListener('touchend', (e) => {
                const delta = e.changedTouches[0].clientY - touchStartY;
                if (delta > 90 && modalContent.scrollTop === 0) closeModal();
            }, { passive: true });
        }

        function filterColors() {
            return state.colors.filter(color => {
                const matchesSearch = !state.searchTerm || 
                    color.name.toLowerCase().includes(state.searchTerm) ||
                    color.hex.toLowerCase().includes(state.searchTerm);

                const matchesColor = !state.colorFilter || 
                    colorSimilarity(state.colorFilter, color.hex) < 50;

                return matchesSearch && matchesColor;
            });
        }

        function colorSimilarity(hex1, hex2) {
            const r1 = parseInt(hex1.slice(1, 3), 16);
            const g1 = parseInt(hex1.slice(3, 5), 16);
            const b1 = parseInt(hex1.slice(5, 7), 16);
            const r2 = parseInt(hex2.slice(1, 3), 16);
            const g2 = parseInt(hex2.slice(3, 5), 16);
            const b2 = parseInt(hex2.slice(5, 7), 16);
            return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
        }

        function renderColors() {
            const filtered = filterColors();
            const container = document.getElementById('mainContent');

            if (state.currentView === 'grid') {
                container.innerHTML = '<div class="grid-view"></div>';
                const grid = container.querySelector('.grid-view');
                filtered.forEach(color => {
                    grid.appendChild(createColorCard(color));
                });
            } else {
                container.innerHTML = '<div class="list-view"></div>';
                const list = container.querySelector('.list-view');
                filtered.forEach(color => {
                    list.appendChild(createColorRow(color));
                });
            }

            // Crea gradient custom dai colori veri e aggiorna scala fissa
            const colorScale = document.querySelector('.color-scale');
            if (filtered.length > 0 && colorScale) {
                const stops = filtered.map((color, i) => {
                    const percent = (i / (filtered.length - 1)) * 100;
                    return `${color.hex} ${percent}%`;
                }).join(', ');
                colorScale.style.background = `linear-gradient(180deg, ${stops})`;
            }

            setupColorScaleListener();
            updateColorCount(filtered.length);
        }

        function createColorCard(color) {
            const card = document.createElement('div');
            card.className = 'color-card';
            card.innerHTML = `
                <div class="color-swatch" style="background: ${color.hex}"></div>
                <span class="card-number">${String(color.index).padStart(3, '0')}</span>
                <div class="color-info">
                    <div class="color-name">${color.name}</div>
                    <div class="color-hex">${color.hex}</div>
                    <div class="color-usage">${color.use_count}</div>
                </div>
            `;
            card.addEventListener('click', () => showModal(color));
            return card;
        }

        function createColorRow(color) {
            const row = document.createElement('div');
            row.className = 'color-row';
            row.innerHTML = `
                <div class="color-row-swatch" style="background: ${color.hex}"></div>
                <div class="color-row-info">
                    <div class="color-row-name">${color.name}</div>
                    <div class="color-row-code">${color.hex}</div>
                </div>
            `;
            row.addEventListener('click', () => showModal(color));
            return row;
        }

        function showModal(color) {
            state.selectedColor = color;
            state.expandedCombo = null;
            document.getElementById('modalTitle').textContent = color.name;
            document.getElementById('modalSwatch').style.background = color.hex;
            document.getElementById('detailName').textContent = color.name;
            document.getElementById('detailHex').textContent = color.hex;
            document.getElementById('detailRgb').textContent = color.rgb;
            document.getElementById('detailCmyk').textContent = color.cmyk;
            document.getElementById('detailUsage').textContent = color.use_count;

            if (color.combinations && color.combinations.length > 0) {
                document.getElementById('colorCombos').style.display = 'block';
                const list = document.getElementById('combinationsList');
                list.innerHTML = color.combinations.map(comboNum => {
                    const colorsInCombo = state.colors.filter(c => c.combinations.includes(comboNum));
                    const preview = colorsInCombo.slice(0, 5).map(c => 
                        `<div class="combo-preview-swatch" style="background: ${c.hex}"></div>`
                    ).join('');
                    return `<div class="combo-tag" onclick="toggleComboDetails(${comboNum})"><div class="combo-preview">${preview}</div><span>#${comboNum}</span></div><div id="combo-${comboNum}" class="combo-details"></div>`;
                }).join('');
            } else {
                document.getElementById('colorCombos').style.display = 'none';
            }

            const isFav = state.favorites.some(f => f.hex === color.hex);
            document.getElementById('modalFavBtn').textContent = isFav ? 'Nel preferiti' : 'Aggiungi';

            document.getElementById('detailModal').classList.add('active');
        }

        function toggleComboDetails(comboNum) {
            const detailsDiv = document.getElementById(`combo-${comboNum}`);
            
            if (state.expandedCombo === comboNum) {
                detailsDiv.classList.remove('expanded');
                state.expandedCombo = null;
            } else {
                if (state.expandedCombo !== null) {
                    document.getElementById(`combo-${state.expandedCombo}`).classList.remove('expanded');
                }
                
                const colorsInCombo = state.colors.filter(c => c.combinations.includes(comboNum));
                detailsDiv.innerHTML = colorsInCombo.map(c => `
                    <div class="combo-color-item" onclick="showModal(state.colors[${c.index - 1}]); event.stopPropagation();">
                        <div class="combo-color-swatch" style="background: ${c.hex}"></div>
                        <div class="combo-color-info">
                            <div class="combo-color-name">${c.name}</div>
                            <div class="combo-color-codes">
                                <div>${c.hex}</div>
                                <div>RGB: ${c.rgb.replace('R:', '').replace(/ \/ /g, ' ')}</div>
                                <div>CMYK: ${c.cmyk.replace('C:', '').replace(/ \/ /g, ' ')}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                detailsDiv.classList.add('expanded');
                state.expandedCombo = comboNum;
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            state.selectedColor = null;
            state.expandedCombo = null;
        }

        function loadFavorites() {
            const saved = localStorage.getItem('sanzoFavorites');
            state.favorites = saved ? JSON.parse(saved) : [];
            renderFavorites();
        }

        function saveFavorites() {
            localStorage.setItem('sanzoFavorites', JSON.stringify(state.favorites));
            renderFavorites();
        }

        function toggleFavorite() {
            if (!state.selectedColor) return;
            const idx = state.favorites.findIndex(f => f.hex === state.selectedColor.hex);
            if (idx >= 0) {
                state.favorites.splice(idx, 1);
            } else {
                state.favorites.push(state.selectedColor);
            }
            saveFavorites();
            const isFav = state.favorites.some(f => f.hex === state.selectedColor.hex);
            document.getElementById('modalFavBtn').textContent = isFav ? 'Nel preferiti' : 'Aggiungi';
        }

        function renderFavorites() {
            const sidebar = document.getElementById('favoritesSidebar');
            if (state.favorites.length === 0) {
                sidebar.innerHTML = `<div class="favorites-title">Preferiti</div><div class="empty-favorites">Nessuno salvato</div>`;
                return;
            }

            sidebar.innerHTML = `
                <div class="favorites-title">Preferiti (${state.favorites.length})</div>
                <div class="favorites-list">
                    ${state.favorites.map(fav => `
                        <div class="favorite-item" onclick="showModal(state.colors[${state.colors.findIndex(c => c.hex === fav.hex)}]); document.getElementById('favoritesSidebar').classList.remove('active');">
                            <div class="favorite-item-swatch" style="background: ${fav.hex}"></div>
                            <div class="favorite-item-info">
                                <div class="favorite-item-name">${fav.name}</div>
                                <div class="favorite-item-hex">${fav.hex}</div>
                            </div>
                            <button class="remove-favorite" onclick="removeFavorite('${fav.hex}'); event.stopPropagation();">x</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function removeFavorite(hex) {
            state.favorites = state.favorites.filter(f => f.hex !== hex);
            saveFavorites();
        }

        function shareColor() {
            if (!state.selectedColor) return;
            const text = state.selectedColor.name + ' - ' + state.selectedColor.hex + 
                         '\nRGB: ' + state.selectedColor.rgb + 
                         '\nCMYK: ' + state.selectedColor.cmyk;
            
            if (navigator.share) {
                navigator.share({ title: 'Sanzo Colors', text });
            } else {
                navigator.clipboard.writeText(text).then(() => showToast('Copiato'));
            }
        }

        function updateColorCount(count = state.colors.length) {
            document.getElementById('colorCount').textContent = count + ' colori';
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1800);
        }

        // Mini scala cromatica - senza lag
        function setupColorScaleListener() {
            const main = document.getElementById('mainContent');
            const indicator = document.querySelector('.color-scale-indicator');
            const colorScale = document.querySelector('.color-scale');
            
            if (!colorScale || !indicator) return;

            let ticking = false;
            main.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        const scrollTop = main.scrollTop;
                        const scrollHeight = main.scrollHeight - main.clientHeight;
                        const scrollPercent = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
                        indicator.style.top = (scrollPercent * (window.innerHeight - 2)) + 'px';
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });

            const scrollToPercent = (clientY) => {
                const percent = Math.max(0, Math.min(1, clientY / window.innerHeight));
                main.scrollTop = percent * (main.scrollHeight - main.clientHeight);
            };

            colorScale.addEventListener('click', (e) => scrollToPercent(e.clientY));

            // Touch drag
            colorScale.addEventListener('touchstart', (e) => {
                e.preventDefault();
                scrollToPercent(e.touches[0].clientY);
            }, { passive: false });

            colorScale.addEventListener('touchmove', (e) => {
                e.preventDefault();
                scrollToPercent(e.touches[0].clientY);
            }, { passive: false });

            // Mouse drag
            let dragging = false;
            colorScale.addEventListener('mousedown', (e) => {
                dragging = true;
                scrollToPercent(e.clientY);
            });
            document.addEventListener('mousemove', (e) => {
                if (dragging) scrollToPercent(e.clientY);
            });
            document.addEventListener('mouseup', () => { dragging = false; });
        }

        // Inizializza la scala al caricamento
        setupColorScaleListener();

        // Chiudi sidebar preferiti cliccando fuori
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('favoritesSidebar');
            const favBtn = document.getElementById('favBtn');
            if (sidebar.classList.contains('active') &&
                !sidebar.contains(e.target) &&
                e.target !== favBtn) {
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
